
font_family      family="FiraCode Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto

cursor_shape underline

cursor_trail 1

cursor_trail_color #3cf
hide_window_decorations yes

tab_bar_style powerline
tab_powerline_style round
active_tab_background #3cf

background_opacity 0.8
kitty_mod ctrl+shift

map kitty_mod+right next_tab
map ctrl+page_down  next_tab
map ctrl+tab        next_tab

map kitty_mod+left previous_tab
map ctrl+page_up   previous_tab
map ctrl+shift+tab previous_tab
map kitty_mod+.          move_tab_forward
map ctrl+shift+page_down move_tab_forward

map kitty_mod+,        move_tab_backward
map ctrl+shift+page_up move_tab_backward

map kitty_mod+alt+t set_tab_title
map shift+cmd+i     set_tab_title
map F2              set_tab_title

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

map ctrl+shift+q none
