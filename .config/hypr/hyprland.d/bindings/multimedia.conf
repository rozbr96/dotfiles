
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

binde = , XF86AudioRaiseVolume, exec, volume increase sink
binde = , XF86AudioLowerVolume, exec, volume decrease sink
bind = , XF86AudioMute, exec, volume mute sink toggle
binde = SHIFT, XF86AudioRaiseVolume, exec, volume increase sink 20
binde = SHIFT, XF86AudioLowerVolume, exec, volume decrease sink 20
binde = CONTROL, XF86AudioRaiseVolume, exec, volume set sink 100
binde = CONTROL, XF86AudioLowerVOlume, exec, volume set sink 50

bind = , Print, exec, $binpath/screenshot.sh monitor both
bind = CONTROL, Print, exec, $binpath/screenshot.sh full both
bind = ALT, Print, exec, $binpath/screenshot.sh window both
bind = SHIFT, Print, exec, $binpath/screenshot.sh region both
